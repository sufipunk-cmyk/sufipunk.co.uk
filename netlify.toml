[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*"]

[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# URL canonicalization (Phase 1, Section E).
# The canonical host is the bare apex, https://sufipunk.co.uk — matching
# `metadataBase` and every per-page `alternates.canonical`. Force any
# request that arrives on the www subdomain to a 301 redirect to the apex
# so visitors and crawlers only ever see one canonical origin.
[[redirects]]
  from = "https://www.sufipunk.co.uk/*"
  to = "https://sufipunk.co.uk/:splat"
  status = 301
  force = true